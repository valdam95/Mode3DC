# JOURNAL WRITING PATTERNS (extracted from published papers)
# ============================================================================
# Conventions aligned to Journal of the Mechanics and Physics of Solids.
# Use these patterns whenever drafting or
# revising manuscript text for this journal.

journal_writing_patterns:

  overall_section_architecture:
    pattern_A:
      name: "Method-development + Case study (most common)"
      structure:
        - "1. Introduction"
        - "2. Methodology / Framework development (deep subsections 2.1–2.N)"
        - "3. Case study / Application (3.1 Background, 3.2 Study sites, 3.3 Parameters, 3.4 Results and discussion)"
        - "4. Conclusions"
    pattern_B:
      name: "Experimental + Modelling"
      structure:
        - "1. Introduction"
        - "2. Materials and experiment (2.1 Materials, 2.2 Experimental design, 2.3 Test procedure)"
        - "3. Modelling framework (3.1 FE setup, 3.2 Input parameters)"
        - "4. Results and discussion (subsections by phenomenon, not by figure)"
        - "5. Conclusions"
    pattern_C:
      name: "Simulation-heavy"
      structure:
        - "1. Introduction"
        - "2. Numerical model (governing equations, calibration, validation)"
        - "3. Results (subsections by physical quantity or phenomenon)"
        - "4. Discussion (4.1 Stress analysis, 4.2 Comparison with existing models, 4.3 Limitations)"
        - "5. Conclusions"
    key_observations:
      - "Results and Discussion are often combined, with subsections by topic."
      - "When separated, Discussion addresses physical interpretation, comparison with literature, and limitations."
      - "A dedicated limitations paragraph or subsection is standard."
      - "Subsection depth goes to three levels (e.g. 3.3.1) but rarely four."

  abstract:
    length: "80–150 words typically; max 250 per journal rules. Concise and dense."
    five_part_flow:
      - context: "State the real-world problem or gap (1 sentence)."
      - method: "Name the tool/approach and what it does (1–2 sentences)."
      - application: "Where/how it was applied (1 sentence)."
      - key_results: "Quantitative or specific (1–2 sentences)."
      - significance: "Framework-level contribution (1 sentence)."
    wording_conventions:
      - "No references in the abstract (or minimal, author + year only)."
      - "No equations."
      - "Use 'this study' (not 'we' or 'the authors')."
      - "Active constructions: 'introduces', 'reveals', 'quantifies', 'demonstrates'."
      - "End with the broader framework or applicability statement."

  highlights:
    - "Each bullet is a standalone factual statement, not a question or vague claim."
    - "Use active verbs: 'controls', 'captures', 'defines'."
    - "Specific enough to differentiate from other papers."

  introduction:
    typical_length: "3–5 paragraphs"
    paragraph_flow:
      - "Broad context (2–4 sentences): Real-world relevance, scale, societal impact. May include quantitative framing."
      - "State of the art (1–2 paragraphs): Each cited study gets a specific statement of what it did, found, and did not do."
      - "Gap identification (explicit, often at paragraph boundary)."
      - "This study (final paragraph): What the paper does, how, and what the key innovation is."
    wording_conventions:
      - "Prior work critiqued constructively: 'did not incorporate', 'lacked integration', 'was limited to'."
      - "Final paragraph uses strong verbs: 'introduces', 'automates', 'addresses key limitations', 'enables'."
      - "Quantitative context whenever possible."

  methods:
    detail_level: "Extremely detailed and reproducible. The journal expects applied science."
    conventions:
      - "Software and tools named explicitly with versions."
      - "Every input parameter listed with symbol, unit, distribution type, source/reference."
      - "Equations numbered sequentially as Eq. (1), Eq. (2). Variables defined immediately after."
      - "Workflow steps often presented as a numbered list (Step 1–N)."
      - "Validation/verification subsection comparing model output to measured data before new results."
      - "Geometry/mesh: specific dimensions, mesh size, boundary conditions, and justification."
      - "Assumptions and simplifications stated explicitly inline."

  results_and_discussion:
    organisation: "Subsections by physical phenomenon or analysis type, not by figure number."
    paragraph_template:
      - "State what is shown (reference figure/table)."
      - "Describe key trends quantitatively."
      - "Compare with literature."
      - "Interpret physically."
      - "State implications or caveats."
    quantitative_density: "Every result paragraph contains specific numbers. Vague statements always accompanied by the actual value."
    literature_comparison: "Direct, numerical when possible."
    limitations_inline: "Stated factually, not apologetically. Clarify scope rather than undermine findings."

  discussion_standalone:
    covers:
      - "Physical mechanism analysis — deeper interpretation than Results."
      - "Comparison with established models/theories."
      - "Dedicated Limitations subsection — honest, specific, forward-looking."

  conclusions:
    length: "One substantial paragraph + 3–5 bullet points + one closing paragraph."
    three_part_flow:
      - "Opening summary (2–4 sentences): Restate problem and what was done."
      - "Key findings as bullet points or numbered items. Self-contained result statements, quantitative, mechanistic."
      - "Closing paragraph: Limitations + future work + broader significance."
    wording_conventions:
      - "'The following conclusions can be drawn.' or similar."
      - "Present tense for established findings, past tense for what was done."
      - "End on applicability and future directions, not on limitations."

  equations_and_symbols:
    - "Equations numbered sequentially: Eq. (1), Eq. (2), etc."
    - "Variables defined immediately after the equation block."
    - "Symbol/abbreviation tables common (placed after keywords or after methods)."
    - "Greek letters and subscripts in proper math mode throughout."
    - "Units always stated with each variable definition."

  figures_and_tables_in_text:
    figures: "Fig. 1, Fig. 2 (abbreviated, capitalised). Sub-panels: Fig. 3(a), Fig. 3(a-b)."
    tables: "Table 1, Table 2 (not abbreviated)."
    equations: "Eq. (1), Eqs. (3), (4), (5)."
    referencing: "Figures and tables referenced before the reader encounters them."

  figure_captions:
    - "Start with object description."
    - "Include axis descriptions when helpful."
    - "End with data source if applicable."
    - "Sub-panel descriptions: (a) and (b) show...; (c) depicts...; (d) illustrates..."

  table_conventions:
    headers: "Symbol + unit in parentheses, e.g. 'GMC (%)', 'Fill height (m)'."
    footnotes: "Below the table for symbol definitions."
    ranges: "En-dash for data ranges: '1700–2100'."

  end_matter_order:
    - "1. CRediT authorship contribution statement"
    - "2. Funding statement"
    - "3. Declaration of competing interest"
    - "4. Declaration of generative AI (if applicable)"
    - "5. Acknowledgments"
    - "6. Data availability statement"
    - "7. References"

  verb_and_phrase_inventory:
    introducing_method: "This study introduces / develops / presents / proposes"
    stating_results: "Results reveal / show / indicate / demonstrate / confirm"
    interpreting: "This arises because / This is attributed to / This divergence arises because"
    comparing_literature: "aligns with / is consistent with / closely matches / corroborates / supports"
    noting_limitations: "did not incorporate / lacked / is limited by / does not explicitly capture / should be interpreted as"
    significance: "highlights / underscores / reinforces the need for / provides a framework for"
    conclusions: "The following conclusions can be drawn / It can be concluded that / It is therefore concluded that"
    future_work: "Future work should / Future studies should incorporate / warrants further investigation"


# ============================================================================
# JOURNAL IDENTITY & GUIDE FOR AUTHORS
# ============================================================================

journal_identity:
  full_name: "Journal of the Mechanics and Physics of Solids"
  publisher: "Elsevier"
  type: "International peer-reviewed journal"
  peer_review: "Single anonymized (minimum two independent reviewers)"
  article_types:
    - "Research Articles"
    - "Review Articles"
    - "Short Communications"

scope_and_aims:
  description: |
    The Journal was founded in 1952 by Rodney Hill, who was its Editor-in-Chief
    until 1968. It continues to enjoy a pre-eminent position in the field of
    solid mechanics.
    The Journal aims to publish research of the highest quality and lasting
    significance on the mechanics of solids. Its scope is broad, ranging from
    fundamental mechanics concepts to analysing novel phenomena and applications.
    Solids are interpreted broadly and include natural and synthetic materials
    and structures. The approach can be theoretical, experimental, or
    computational. This research activity sits within engineering science and at
    the nexus between the allied areas of mathematics, material science,
    chemistry, biology, and physics.
    The Journal's main purpose is to foster a scientific understanding of all
    issues impacting the mechanical response of solid materials and their
    relations to the underlying microstructure and physical mechanisms. Its
    content reflects the current state of the discipline in analysis,
    experimental observation, numerical simulation, and data analysis.
    Authors are encouraged to consider the significance of their contributions
    to the field of mechanics and the implications of their results, in addition
    to describing the details of their work.
  core_topics:
    - "Fundamental mechanics concepts in solids"
    - "Novel phenomena and applications in solid mechanics"
    - "Mechanical response of natural and synthetic materials and structures"
    - "Microstructure-mechanics-physics relations in solids"
    - "Theoretical, experimental, and computational mechanics"
    - "Analysis, experimental observation, numerical simulation, and data analysis"
    - "Interdisciplinary mechanics at the interface with mathematics, materials science, chemistry, biology, and physics"
  emphasis:
    - "Highest quality and lasting significance in the mechanics of solids."
    - "Scientific understanding of mechanisms governing solid-material response."
    - "Significance and implications of results should be stated, not only procedural details."

editorial_leadership:
  - area: "Sea ice and arctic marine technology"
    editors: "Prof. Jukka Tuhkuri"
  - area: "Snow and snow avalanche"
    editors: "Dr. Nicolas Eckert & Dr. Betty Sovilla"
  - area: "Frozen soil, frozen rocks and permafrost"
    editors: "Prof. Jilin Qi & Prof. Mingyi Zhang"
  - area: "River ice"
    editors: "Prof. Mark Loewen"
  - area: "Atmospheric icing"
    editors: "Dr. Krzysztof Szilder"

manuscript_preparation:
  language: "American English (author preference). The journal allows American or British English but not a combination."

  title_page:
    required: true
    elements:
      - "Article title: Concise, informative; avoid abbreviations and formulae unless established"
      - "Author names: Given and family names; order must match submission system"
      - "Affiliations: Full postal address including country; lower-case superscript letters"
      - "Corresponding author: Clearly indicated"

  abstract:
    max_words: 250
    requirements:
      - "Concise and factual"
      - "Must stand alone"
      - "Avoid references (if essential, cite author(s) and year(s))"
      - "Avoid non-standard abbreviations (define at first mention if essential)"

  keywords:
    count: "1 to 7"
    language: "English"
    guidelines:
      - "Avoid multi-word keywords using 'and' or 'of'"
      - "Use abbreviations only if firmly established"

  highlights:
    required: true
    count: "3 to 5 bullet points"
    max_characters_per_bullet: 85
    submission: "Separate editable file with 'highlights' in filename"

  graphical_abstract:
    encouraged: true
    dimensions: "531 × 1328 pixels (h × w) or proportionally more; readable at 5 × 13 cm"
    file_types: ["TIFF", "EPS", "PDF", "MS Office"]
    ai_restriction: "No generative AI or AI-assisted tools for creation or alteration"

file_format:
  source_files: "Editable: .doc/.docx for Word, .tex for LaTeX. PDF is NOT acceptable."
  word_layout: "Single-column"
  latex_layout: "Single- or double-column permitted"
  cleanup: "Remove strikethrough and underlined text unless scientifically significant"

figures_and_artwork:
  resolution:
    vector_drawings: "EPS or PDF, fonts embedded"
    halftones: "300 dpi minimum (single column: 1063 px, full page: 2244 px)"
    bitmapped_line: "1000 dpi minimum (single column: 3543 px, full page: 7480 px)"
    line_halftone_combo: "500 dpi minimum (single column: 1772 px, full page: 3740 px)"
  rules:
    - "Cite all images in manuscript text"
    - "Number sequentially as they appear"
    - "Submit each as a separate file (e.g. Figure_1, Figure_2)"
    - "Each figure must have a caption (brief title + description)"
    - "No generative AI for creating or altering images (exception: AI as part of research design/methods)"

tables:
  format: "Editable text, NOT images"
  rules:
    - "Cite all tables in manuscript text"
    - "Number consecutively by appearance"
    - "Include captions"
    - "No vertical rules or shading within cells"

references:
  in_text_citation_style:
    single_author: "Name (year) — e.g. Allan (2020)"
    two_authors: "Both names (year) — e.g. Allan and Jones (2019)"
    three_plus_authors: "First author et al. (year) — e.g. Kramer et al. (2023)"
    groups: "Alphabetically then chronologically, or vice versa"
  reference_list:
    order: "Alphabetically, then chronologically"
    same_year: "Identified by letters a, b, c after year"
    journal_abbreviation: "Per LTWA (List of Title Word Abbreviations)"
    dois: "Recommended"
  examples:
    journal_article: "Van der Geer, J., Handgraaf, T., Lupton, R.A., 2020. The art of writing a scientific article. J. Sci. Commun. 163, 51–59. https://doi.org/10.1016/j.sc.2020.00372."
    journal_article_with_number: "Van der Geer, J., Handgraaf, T., Lupton, R.A., 2022. The art of writing a scientific article. Heliyon. 19, e00205."
    book: "Strunk Jr., W., White, E.B., 2000. The Elements of Style, fourth ed. Longman, New York."
    book_chapter: "Mettam, G.R., Adams, L.B., 2023. How to prepare an electronic version of your article, in: Jones, B.S., Smith, R.Z. (Eds.), Introduction to the Electronic Age. E-Publishing Inc., New York, pp. 281–304."
    website: "Cancer Research UK, 2023. Cancer statistics reports for the UK. http://www.cancerresearchuk.org/... (accessed 13 March 2023)."
    dataset: "Oguro, M., et al., 2015. Mortality data for Japanese oak wilt disease... [dataset]. Mendeley Data, v1. https://doi.org/10.17632/xwj98nb39r.1."
    software: "Coon, E., et al., 2020. Advanced Terrestrial Simulator (ATS) v0.88 [software]. Zenodo. https://doi.org/10.5281/zenodo.3727209."

article_structure:
  required_sections:
    - "Title page"
    - "Abstract"
    - "Keywords"
    - "Main body (clearly divided with headings)"
    - "Acknowledgements (separate section, directly before references)"
    - "Author contributions (CRediT taxonomy)"
    - "Declaration of competing interests"
    - "Funding sources"
    - "Declaration of generative AI use (if applicable)"
    - "References"
  credit_roles:
    - "Conceptualization"
    - "Data curation"
    - "Formal analysis"
    - "Funding acquisition"
    - "Investigation"
    - "Methodology"
    - "Project administration"
    - "Resources"
    - "Software"
    - "Supervision"
    - "Validation"
    - "Visualization"
    - "Writing – original draft"
    - "Writing – review and editing"

ethics_and_policies:
  submission_declaration:
    - "Work not previously published (except preprint, abstract, thesis, registered report)"
    - "Not under consideration elsewhere"
    - "Approved by all authors and responsible authorities"
    - "If accepted, will not be published elsewhere without copyright-holder consent"
  authorship:
    requirements:
      - "Conception/design of the study, or data acquisition, or analysis/interpretation"
      - "Drafting the article or critically revising it"
      - "Final approval of the submitted version"
  competing_interests: "All authors must disclose financial and personal relationships that could bias their work."
  funding_statement_format: "Funding: This work was supported by the [Funder Name] [grant numbers xxxx, yyyy]."
  no_funding_statement: "This research did not receive any specific grant from funding agencies in the public, commercial, or not-for-profit sectors."
  generative_ai_declaration: |
    If AI tools were used, add before references:
    "Declaration of generative AI and AI-assisted technologies in the manuscript preparation process.
    During the preparation of this work the author(s) used [NAME OF TOOL / SERVICE] in order to [REASON].
    After using this tool/service, the author(s) reviewed and edited the content as needed and take(s)
    full responsibility for the content of the published article."
  research_data: "Option C: Deposit data in repository, cite and link in article, or state why not possible."
  maps:
    - "Show only the area actually studied."
    - "Include note: 'map lines delineate study areas and do not necessarily depict accepted national boundaries'."
  inclusive_language:
    - "Acknowledge diversity, convey respect, promote equal opportunities."
    - "Avoid descriptors about personal attributes unless relevant."
    - "Write for gender neutrality."

submission_process:
  method: "Online submission system (converts files to single PDF for review)"
  correspondence: "All via email"
  proof_corrections: "Required within 2 days"
  significant_changes: "Require editor approval at proof stage"
  share_link: "50 days free access for corresponding author (not for open access articles)"

preprints:
  sharing: "Authors may share preprints (does not count as prior publication)"
  ssrn: "Free preprint posting on SSRN available during submission"
  doi: "Preprint receives a DOI and links to version of record if published"
