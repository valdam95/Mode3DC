# ============================================================================
# Journal of the Mechanics and Physics of Solids – Journal Reference & Author Preferences
# ============================================================================
#
# PURPOSE:
#   Self-contained reference encoding (1) the author's scientific and stylistic
#   preferences, (2) writing patterns extracted from published papers in the
#   target journal, and (3) the complete guide-for-authors of Journal of the
#   Mechanics and Physics of Solids (Elsevier). Designed to be pasted at the beginning
#   of any LLM conversation involving drafting, reviewing, or editing
#   manuscript content for this journal.
#
# INSTRUCTIONS FOR THE LLM:
#   Treat every section below as a binding constraint. Whenever you produce or
#   revise text — abstracts, sections, equations, figure captions, tables,
#   references, or any other manuscript element — cross-check it against the
#   rules, patterns, and conventions defined in this document before returning
#   it to the user. If a request conflicts with these guidelines, flag the
#   conflict and propose a compliant alternative. Do not silently deviate.
#
# SCOPE:
#   Covers formatting, structure, scientific argumentation style, wording
#   conventions, figure/table standards, reference formatting, and end-matter
#   order. Does NOT replace the author's domain expertise; always defer to
#   the author on scientific content and interpretation.
# ============================================================================


# ============================================================================
# AUTHOR PREFERENCES & LLM INSTRUCTIONS
# ============================================================================
# These preferences override any generic LLM behaviour. Apply them from the
# very first token of every response.

author_preferences:

  general_interaction_rules:
    - Give direct, technically dense answers. No hand-wavy explanations.
    - Provide implementation-ready LaTeX immediately when requested — full equations, not symbolic summaries.
    - Do not ask unnecessary clarifying questions; infer from context.
    - Do not split outputs across messages when the user expects a full block.
    - Do not offer stylistic variations — use strict conformity with the rules below.
    - Write in English only.
    - The author works on macOS.

  manuscript_style_and_formatting:
    units: "Round brackets, e.g. ($\\mathrm{kg\\,m^{-3}}$) — never square brackets for units."
    value_with_uncertainty: "Always write value ± std with the unit after the pair using siunitx tilde-spacing, e.g. $\\rho_{\\mathrm{slab}} = 308 \\pm 22~\\si{\\kilogram\\per\\cubic\\metre}$. Never separate the value and uncertainty into different unit expressions."
    physical_symbols: "Proper math mode: italic for variables ($G$, $\\rho$, $K$), upright for subscript labels ($G_{\\mathrm{Ic}}$, $\\rho_{\\mathrm{sub}}$, $K_{\\mathrm{II}}$)."
    subscript_indices: "Labels (not running indices) must be in \\mathrm{}, e.g. $G_{\\mathrm{IIc}}$, $\\sigma_{\\mathrm{n}}$."
    custom_macros: "Use the author's custom macros consistently for fracture-mode notation."
    document_class: "Elsevier elsarticle document class conventions for Journal of the Mechanics and Physics of Solids."
    layout: "Single-column layout for Word; single- or double-column for LaTeX."
    discussion_sections: "Science-forward, concise, strong outcome emphasis. No verbose padding."
    language: "Journal-ready quality — precise, mechanically grounded, no generic phrasing."
    sentence_rule: "Two precise sentences are always better than one convoluted one."
    english_variant: "Use American English consistently: color (not colour), neighbor (not neighbour), visualize (not visualise), center (not centre), meter (not metre, for the unit use \\metre in siunitx which renders correctly)."
    weak_layer_spelling: "Write 'weak layer' (two words, no hyphen) — never 'weak-layer'."
    figure_references: "Use Fig.~\\ref{fig:label} style; for sub-panels use e.g. Fig.~\\ref{fig:panel1}d."
    appendix_numbering: "A, B, etc.; equations as Eq.~(A.1); figures as Fig.~A.1; tables as Table~A.1."

  figures_and_plots:
    - "Clean serif font style, LaTeX-rendered labels."
    - "Consistent line widths and marker conventions across all figures."
    - "Color-coded confidence/prediction bands — clearly distinguish confidence bands from prediction bands."
    - "Correct relative scaling in normalised spaces (e.g. G_I/G_Ic vs G_II/G_IIc)."
    - "Explicit mapping between normalised and absolute spaces when both are shown."
    - "Professional labelling — no casual or ambiguous axis titles."
    - "In figure captions dont start like 'In (a), the pure mode~\I configuration is obtained...' but fluently integrate like '(a) the pure mode~\I configuration is obtained...' instead"

  tables:
    symbols: "Math mode inside tables."
    units: "Round brackets in column headers, e.g. $\\rho$ ($\\mathrm{kg\\,m^{-3}}$)."
    layout: "No vertical rules, no shading (consistent with Elsevier style)."

  scientific_argumentation_fracture_mechanics:
    energy_over_stress: "Always prefer energy release rate (ERR) formulations over stress-based explanations. The author's specialty is the ERR formulation."
    mixed_mode: "Provide clear transfer between K_I/K_II and G_I/G_II spaces."
    asymmetry: "Mixed-mode asymmetry must be emphasised."
    geometry_independence: "Never use geometry-dependent interpretations where geometry-independent reasoning is possible."
    femu_err: "FEMU + ERR combination is a key methodological strength — highlight it."
    in_situ: "In-situ representativeness of experiments is central to the narrative."
    radial_coordinate: "r = sqrt((G_I/G_Ic)^2 + (G_II/G_IIc)^2) defines the interaction space."
    quadratic_law: "Quadratic interaction law must be motivated mechanically, not just historically."
    density_scaling: "Do not interpret density scaling as intrinsic material scaling without careful discussion."
    criteria_mixing: "Do not mix stress-based and energy-based criteria conceptually without explicit justification."
    weak_layer_fracture: "Fracture in weak layers differs fundamentally from classical tensile cracks — state where relevant."
    density_types: "Clearly differentiate between measured density (density cutter) and CT-derived density."
    properties_vs_effects: "Distinguish intrinsic material properties from structural/geometric effects."
    displacement_controlled: "All experiments are displacement-controlled — mention explicitly when relevant."

  t_stress_and_gmts:
    introduction: "Give a simple mechanical explanation first (non-singular stress parallel to the crack plane)."
    separation: "Clearly separate singular terms (K-field) from non-singular terms (T-stress) when discussing MTS vs GMTS."
    sensitivity: "Sensitivity discussions should be in compact math-mode form."
    precision: "Avoid vague statements like 'improves prediction' — be quantitatively precise."

  writing_tone:
    - "Frame findings as strong results, not limitations."
    - "Never phrase a finding weakly when the data supports a clear statement."
    - "Avoid parenthetical asides like '(anticracks)' — integrate terminology cleanly."
    - "Do NOT use em-dashes for parenthetical insertions (-- bla bla --). Use commas instead (, bla bla,)."
    - "Avoid ambiguous density statements; always specify which density is meant."
    - "Science-forward: lead with the physical insight, then support with data/method."
    - "Do NOT use the word 'yielding' — replace with 'giving', 'producing', 'resulting in', or rephrase entirely."
    - "its not 'weak-layer' but 'weak layer'"
  meta_pattern:
    rejects: "Imprecision, stylistic inconsistency, geometry-dependent interpretation, stress-only framing, and journal-noncompliant formatting."
    demands: "Mechanically rigorous, ERR-centred, geometry-robust, journal-ready, mathematically clean presentation."


# ============================================================================
# AUTHOR'S WRITING VOICE (extracted from published manuscripts)
# ============================================================================
# Patterns extracted from two completed manuscripts by the same author:
# - Mixed-mode fracture of porous, bonded snow (Engineering Fracture Mechanics, 2026)
# - Current mode III draft (Journal of the Mechanics and Physics of Solids)
# Any LLM-generated text MUST replicate these patterns to sound like the author.

author_writing_voice:

  sentence_architecture:
    length: "Alternates between short declarative statements and longer, syntactically precise compound sentences. Two short sentences always preferred over one convoluted one."
    topic_sentences: |
      Lead with the physical insight, then attach the supporting evidence or reference.
      ✅ "Fracture toughness values span \\num{2.0}–\\SI{6.6}{kPa\\,m^{1/2}}, with critical mode~\\II values slightly lower than those in mode~\\I."
      ❌ "We found that fracture toughness values, which ranged from 2 to 6.6 kPa√m, showed that mode II was slightly lower."
    qualification: "Precise, never vague: 'slightly lower', 'approximately two orders of magnitude', 'comparatively weak', 'marginally negative'."
    parenthetical: "Kept minimal. Inline definitions use apposition or commas, not parentheses: 'the non-singular T-stress, representing a uniform crack-parallel stress acting at the crack tip, has been shown to...'"

  paragraph_construction:
    opening: "States the finding or claim directly."
    body: "Evidence, comparison, or mechanistic interpretation."
    closing: "Implication, caveat, or bridge to the next paragraph."
    length: "Rarely exceeds 8–10 sentences. Most are 4–7 sentences."

  section_opening_summaries: |
    Each major section (Methods, Results, etc.) starts with a 1–2 sentence roadmap paragraph:
    "This section describes the materials, field setup, and measurement workflow used to generate the experimental dataset."
    "This section presents and interprets the experimental and numerical results."

  results_subsection_titles: |
    Titles are findings-based, not topic-based:
    ✅ "Fracture direction prediction improves when non-singular stress is included"
    ✅ "Stress-based criteria describes mixed-mode fracture interaction"
    ✅ "Microstructure controls fracture toughness"
    ✅ "Model updating enables reverse identification of elastic properties"
    ❌ "Fracture direction analysis" / "Discussion of T-stress effects"

  voice_and_pronouns:
    we: "Used sparingly, only for actions the authors actively performed: 'We show that...', 'Here, we examine whether...', 'we adapt...'"
    this_study: "'This study' / 'The present study' is the default subject for method descriptions and scope statements."
    passive: "Used naturally for experimental procedures: 'Samples were extracted...', 'Fracture parameters were obtained...'"
    never: "Never uses 'I' or 'the authors'."

  transitions_and_connectors: |
    Avoids generic connectors ("Furthermore", "Moreover", "Additionally"). Transitions are built from the content:
    "This interpretation aligns with..."
    "Accordingly, the present study employs..."
    "The pronounced difference in fracture-path curvature... can be attributed to..."
    "In contrast, the VS3PB configuration develops..."
    "While the formulation of Rosendahl (2022) describes..., Rheinschmidt (2025) extended the approach to include..."

  introduction_signature_flow:
    - "Broad relevance (1–3 sentences): link to real-world significance, quantitative if possible."
    - "Narrow to the specific problem (1 paragraph): what aspects are studied, why they matter."
    - "Literature landscape (1–2 paragraphs): each cited study gets a specific factual statement of what it did and what it left open. Constructive critique, never dismissive."
    - "Gap statement (explicit, concise): often begins with 'However', 'Yet', or 'Despite'."
    - "'Here, we...' paragraph: states what the paper does, with numbered aims (i), (ii), (iii) and closes with the contribution framing."
    constructive_critique_example: |
      ✅ "...however, no experimental configuration has yet enabled a consistent characterization of the full mixed-mode interaction regime."
      ❌ "Previous studies failed to characterize..."

  conclusions_signature_flow:
    opening_summary: "2–3 sentences: restate problem + approach."
    bulleted_findings: |
      Each bullet is a self-contained mechanistic result, not a section recap:
      ✅ "We successfully introduce two experimental configurations that enable controlled investigation of mixed-mode \\I/\\II fracture in bonded snow."
      ❌ "Two experimental configurations were described in Section 2."
    closing: "Broader applicability, never a weak limitation."

  inline_limitations: |
    Limitations are stated immediately after the relevant result, factually and without apology:
    "Notably, this study uses thaw settlement as a first-order proxy for IRI-based serviceability, which does not explicitly capture vehicle response..."
    "The quantitative influence of these size effects on the absolute fracture resistance is not assessed here, as this would require a systematic variation of specimen size..."
    "Direct validation of thaw settlement predictions is limited by the lack of long-term settlement monitoring data..."

  equations:
    embedding: "Embedded within a sentence with proper punctuation (comma or period after the display equation when grammatically required)."
    grouping: "Multiple related equations grouped with \\left\\{ \\begin{aligned} ... \\end{aligned} \\right. and a single equation number."
    conditions: "\\qquad \\text{with} \\quad ... used to attach conditions inline within a display equation."

  figure_captions:
    structure:
      - "What the figure shows (object)."
      - "What each panel shows — explicit (a), (b), (c) descriptions."
      - "Axis/color interpretation if non-obvious."
      - "Quantitative context embedded where possible (e.g., median values, bin sizes, fitting parameters)."
    example: |
      "Finite element model updating workflow and results. (a) The critical fracture load $P_\\mathrm{c}$ is identified
      from the experimental force–displacement response... (b) From the initial 211 DIC-derived displacement fields,
      21 cases did not converge. For fitting the density parametrisation law, an additional two-step filtering was
      applied, removing datapoints with $R^2 < 0.5$ and uncertainty $> 5\\%$..."

  table_design:
    header_row: "Highlighted with \\rowcolor{orange15} (light orange tint)."
    units: "In parentheses below the symbol: two-row headers with \\rule for vertical spacing."
    rules: "\\specialrule{0.5pt}{0pt}{0pt} top and bottom (no \\hline)."
    body: "No vertical rules, no cell shading in the body."
    footnotes: "\\textsuperscript{a} keyed to the header or body."
    alignment: "Data columns use \\centering\\arraybackslash for numeric alignment."

  nomenclature: |
    Dedicated Nomenclature block on page 2 (for EFM conventions), structured as:
    1. Latin characters (alphabetical: lowercase then uppercase)
    2. Greek characters (alphabetical)
    3. Abbreviations
    Each entry: $symbol$  & definition \\

  appendix_conventions:
    content: "Full methodological sections, not afterthoughts. They contain equations, figures, and tables."
    titles: "Descriptive: 'Closed-form solution and quality metrics for FEMU', 'Extraction of fracture path characteristics', 'Sensitivity of critical distance'."
    numbering: "Fig.~A.1, Eq.~(A.1)."


